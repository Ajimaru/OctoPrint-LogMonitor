name: Build Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: Docs validation
    runs-on: ubuntu-latest

    steps:
      - # Checkout repository code
        name: Checkout
        uses: actions/checkout@v6

      - # Setup Python for MkDocs build
        name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - # Setup Node.js for optional docs tooling
        name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - # Install npm deps only when project defines them
        name: Install Node.js dependencies
        run: |
          if [ -f package.json ] && [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          elif [ -f package.json ]; then
            npm install --no-audit --no-fund
          else
            echo "No package.json present; skipping npm install"
          fi

      - # Install docs dependencies and build docs when configured
        name: Build docs if mkdocs is configured
        run: |
          if [ ! -f mkdocs.yml ]; then
            echo "No mkdocs.yml found; skipping docs build"
            exit 0
          fi

          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip

          if [ -f requirements-docs.txt ]; then
            python -m pip install -r requirements-docs.txt
          else
            python -m pip install mkdocs mkdocs-material
          fi

          if [ -x ./scripts/generate-diagrams.sh ]; then
            ./scripts/generate-diagrams.sh
          fi

          if [ -x ./scripts/generate-jsdocs.sh ]; then
            ./scripts/generate-jsdocs.sh
          fi

          mkdocs build --strict
