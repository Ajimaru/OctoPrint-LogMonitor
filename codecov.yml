codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 2%
        base: auto
        informational: false
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: false

ignore:
  - "tests/**"
  - "build/**"
  - ".venv/**"
  - ".venv-*/**"
  - "OctoPrint_LogMonitor.egg-info/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false
