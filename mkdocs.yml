site_name: OctoPrint Log Monitor
site_description: Live log streaming and searching for OctoPrint with severity alerting.
site_url: https://Ajimaru.github.io/OctoPrint-LogMonitor/
docs_dir: docs

theme:
  name: material

nav:
  - Home: docs/index.md
  - Plugin:
      - Overview: overview.md
  - Project:
      - Contributing: contributing.md
      - Security: security.md
      - Changelog: changelog.md
      - Authors: authors.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
